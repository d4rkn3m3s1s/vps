# VPS Fleet — phone-03: redroid 11 with libndk ARM translation.
#
# Built via ayasa520/redroid-script (`python3 redroid.py -a 11.0.0 -n`) which
# produces image `redroid/redroid:11.0.0-ndk` with libndk_translation baked in.
# This phone CAN run ARM-only apps (WhatsApp / Instagram / Facebook) that the
# stock x86_64 redroid 13 phones (phone-01/02) cannot.
#
# Separate from the bridge compose so it doesn't disturb the working phones.
# ADB published to host 5557.
#
#   sudo docker compose -f docker-compose.phone03-ndk.yml up -d
#   adb connect 127.0.0.1:5557

services:
  phone-03:
    image: redroid/redroid:11.0.0_ndk
    container_name: fleet-local-phone-03
    privileged: true
    ports:
      - "127.0.0.1:5557:5555"
    volumes:
      - phone03-data:/data
    command:
      - androidboot.redroid_width=600
      - androidboot.redroid_height=1280
      - androidboot.redroid_dpi=240
      - androidboot.redroid_fps=30
      - androidboot.redroid_gpu_mode=guest
      # ARM translation — make the bridge active for both regular + exec loads.
      - androidboot.redroid_enable_native_bridge=1
      - ro.product.cpu.abilist=x86_64,arm64-v8a,x86,armeabi-v7a,armeabi
      - ro.dalvik.vm.native.bridge=libndk_translation.so
      - ro.enable.native.bridge.exec=1
      - ro.dalvik.vm.isa.arm64=x86_64
    restart: unless-stopped

volumes:
  phone03-data:
