services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vps_emulator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vps_emulator']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vps_emulator
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://localhost:4000
      WEB_BASE_URL: http://localhost:3000
    ports:
      - '4000:4000'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - storage_data:/repo/storage

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vps_emulator
      REDIS_URL: redis://redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - storage_data:/repo/storage

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:4000
      DEFAULT_API_KEY: ${DEFAULT_API_KEY}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  storage_data:
