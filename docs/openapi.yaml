openapi: 3.1.0
info:
  title: VPS Android Emulator Platform API
  version: 1.0.0
  description: REST API for managing Android emulator containers and ADB jobs.
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /auth/login:
    post:
      summary: Authenticate user and issue tokens
  /auth/refresh:
    post:
      summary: Refresh tokens
  /emulators:
    get:
      summary: List emulators
    post:
      summary: Create an emulator
  /emulators/{id}/start:
    post:
      summary: Start emulator
  /emulators/{id}/stop:
    post:
      summary: Stop emulator
  /emulators/{id}:
    delete:
      summary: Delete emulator
  /emulators/{id}/install:
    post:
      summary: Install APK on emulator
  /emulators/{id}/screenshot:
    post:
      summary: Capture emulator screenshot
  /jobs:
    get:
      summary: List jobs
  /jobs/{id}:
    get:
      summary: Get job status
  /plugins:
    get:
      summary: List plugin modules
  /plugins/{id}:
    get:
      summary: Get plugin module details
  /audit:
    get:
      summary: List recent audit events
  /system/overview:
    get:
      summary: Get system telemetry overview
  /devices:
    get:
      summary: List devices
    post:
      summary: Create a device
  /devices/quick:
    post:
      summary: Quick profile — provision a disposable cloud phone in one call
      description: >
        Multilogin-style one-call provisioning. Creates a cloud phone with a
        fresh randomized fingerprint (auto-named, tagged `quick` in metadata) and
        optionally dispatches a start job. Authenticate with an automation API
        key (x-api-key) for programmatic use.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                countryCode: { type: string, description: 2-letter country for the fingerprint }
                deviceModel: { type: string }
                androidVersion: { type: string }
                ramGb: { type: integer }
                cpuCores: { type: integer }
                autoStart: { type: boolean, description: dispatch an EMULATOR_START job }
      responses:
        '201':
          description: Created (returns { device, job? })
  /devices/{id}:
    get:
      summary: Get a device
    put:
      summary: Update a device
    delete:
      summary: Delete a device
  /devices/status/summary:
    get:
      summary: Device status summary
  /devices/{id}/heartbeat:
    post:
      summary: Update device heartbeat
  /accounts/providers/status:
    get:
      summary: Account-provider connectivity (SMS / email / identity)
  /accounts/sms/balance:
    get:
      summary: SMS provider balance (sms-bus)
  /accounts/sms/number:
    post:
      summary: Rent a disposable phone number for a service
  /accounts/sms/number/{requestId}/otp:
    get:
      summary: Read the OTP for a rented number
  /accounts/identity:
    post:
      summary: Generate a fake identity (name/address/DOB)
  /accounts/mail/inbox:
    post:
      summary: Mint a disposable email inbox
  /accounts/mail/messages:
    get:
      summary: List messages in a disposable inbox
  /accounts/batch:
    post:
      summary: Create a batch of accounts to provision (N at once)
  /accounts/batch/accounts:
    get:
      summary: List generated accounts
  /accounts/batch/accounts/{id}/provision:
    post:
      summary: Provision one account (identity + email + number)
  /accounts/batch/accounts/{id}/register:
    post:
      summary: Run on-device signup (Instagram) for one provisioned account
      description: >
        Dispatches a REGISTER_INSTAGRAM job to the chosen device. The host agent
        drives the Instagram email-signup RPA, reading the confirmation code from
        the disposable inbox. Stops and reports if it hits an SMS/captcha wall.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [deviceId]
              properties:
                deviceId: { type: string }
      responses:
        '200':
          description: Registration job dispatched (account → REGISTERING)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
security:
  - bearerAuth: []
  - apiKeyAuth: []
externalDocs:
  description: WebSocket stream for live device events
  url: ws://localhost:4000/ws/devices
